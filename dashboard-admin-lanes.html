<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Lanes | Archery Admin</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7a1f1f', secondary: '#1f2933', accent: '#f59e0b',
                        bg: { light: '#f3f4f6', dark: '#0f172a' },
                        text: { light: '#111827', dark: '#e5e7eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed z-30 inset-y-0 start-0 w-64 bg-secondary text-white border-e border-gray-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 rtl:translate-x-full lg:rtl:translate-x-0">
            <div class="flex items-center justify-center h-16 border-b border-gray-700 bg-secondary">
                <a href="index.html" class="flex items-center gap-2">
                    <i data-lucide="target" class="w-8 h-8 text-accent"></i>
                    <span class="font-bold text-xl">ArcheryPro</span>
                </a>
            </div>
            <nav class="p-4 space-y-1">
                <a href="dashboard-admin.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Overview
                </a>
                <a href="dashboard-admin-bookings.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Bookings
                </a>
                <a href="dashboard-admin-lanes.html"
                    class="flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-lg transition">
                    <i data-lucide="crosshair" class="w-5 h-5"></i> Lanes
                </a>
                <a href="dashboard-admin-members.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Members
                </a>
                <a href="dashboard-admin-inventory.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i> Inventory
                </a>
                <a href="dashboard-admin-settings.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </a>
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-white/10 rounded-lg transition mt-8 text-left">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ps-64">
            <!-- Top Header -->
            <header
                class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-16 flex items-center justify-between px-4 sm:px-6">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center gap-4 ms-auto">
                    <button id="theme-toggle"
                        class="theme-toggle-btn p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle"
                        class="dir-toggle-btn text-sm font-bold border px-2 py-1 rounded">LTR</button>
                    <span class="font-medium text-sm">Admin User</span>
                </div>
            </header>

            <!-- Dashboard Content -->
            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <h1 class="text-2xl font-bold mb-6">Lane Management</h1>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Lane 1 -->
                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg">Lane 01</h3>
                            <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold">Active</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-4">Type: Standard Indoor</p>
                        <div class="flex gap-2">
                            <button
                                class="flex-1 bg-secondary text-white py-2 rounded text-sm hover:bg-gray-800 transition">Details</button>
                            <button
                                class="flex-1 border border-red-200 text-red-600 py-2 rounded text-sm hover:bg-red-50 transition">Maintenance</button>
                        </div>
                    </div>

                    <!-- Lane 2 -->
                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg">Lane 02</h3>
                            <span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs font-bold">Occupied</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-4">Type: Standard Indoor</p>
                        <div class="flex gap-2">
                            <button
                                class="flex-1 bg-secondary text-white py-2 rounded text-sm hover:bg-gray-800 transition">Details</button>
                            <button
                                class="flex-1 border border-gray-200 text-gray-500 py-2 rounded text-sm cursor-not-allowed">Maintenance</button>
                        </div>
                    </div>

                    <!-- Lane 3 -->
                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 opacity-75">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg">Lane 03</h3>
                            <span
                                class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs font-bold">Maintenance</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-4">Type: Precision</p>
                        <div class="flex gap-2">
                            <button
                                class="flex-1 bg-secondary text-white py-2 rounded text-sm hover:bg-gray-800 transition">Details</button>
                            <button
                                class="flex-1 border border-green-200 text-green-600 py-2 rounded text-sm hover:bg-green-50 transition">Activate</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Sidebar Overlay Mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
