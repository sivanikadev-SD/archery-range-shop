<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Members | Archery Admin</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7a1f1f', secondary: '#1f2933', accent: '#f59e0b',
                        bg: { light: '#f3f4f6', dark: '#0f172a' },
                        text: { light: '#111827', dark: '#e5e7eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed z-30 inset-y-0 start-0 w-64 bg-secondary text-white border-e border-gray-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 rtl:translate-x-full lg:rtl:translate-x-0">
            <div class="flex items-center justify-center h-16 border-b border-gray-700 bg-secondary">
                <a href="index.html" class="flex items-center gap-2">
                    <i data-lucide="target" class="w-8 h-8 text-accent"></i>
                    <span class="font-bold text-xl">ArcheryAdmin</span>
                </a>
            </div>
            <nav class="p-4 space-y-1">
                <a href="dashboard-admin.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Overview
                </a>
                <a href="dashboard-admin-bookings.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Bookings
                </a>
                <a href="dashboard-admin-lanes.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="crosshair" class="w-5 h-5"></i> Lanes
                </a>
                <a href="dashboard-admin-members.html"
                    class="flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-lg transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Members
                </a>
                <a href="dashboard-admin-inventory.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i> Inventory
                </a>
                <a href="dashboard-admin-settings.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </a>
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-white/10 rounded-lg transition mt-8 text-left">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ps-64">
            <!-- Top Header -->
            <header
                class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-16 flex items-center justify-between px-4 sm:px-6">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center gap-4 ms-auto">
                    <button id="theme-toggle"
                        class="theme-toggle-btn p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle"
                        class="dir-toggle-btn text-sm font-bold border px-2 py-1 rounded">LTR</button>
                    <span class="font-medium text-sm">Admin User</span>
                </div>
            </header>

            <!-- Dashboard Content -->
            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <h1 class="text-2xl font-bold mb-6">Member Directory</h1>

                <div
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 dark:bg-gray-700/50">
                                <tr>
                                    <th class="px-6 py-3 font-medium text-gray-500">Name</th>
                                    <th class="px-6 py-3 font-medium text-gray-500">Email</th>
                                    <th class="px-6 py-3 font-medium text-gray-500">Membership</th>
                                    <th class="px-6 py-3 font-medium text-gray-500">Join Date</th>
                                    <th class="px-6 py-3 font-medium text-gray-500">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                    <td class="px-6 py-4 flex items-center gap-3">
                                        <div
                                            class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold">
                                            JD</div>
                                        John Doe
                                    </td>
                                    <td class="px-6 py-4">john.doe@example.com</td>
                                    <td class="px-6 py-4"><span
                                            class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs">Gold</span>
                                    </td>
                                    <td class="px-6 py-4">Jan 10, 2024</td>
                                    <td class="px-6 py-4"><button class="text-blue-600 hover:underline">Edit</button>
                                    </td>
                                </tr>
                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                    <td class="px-6 py-4 flex items-center gap-3">
                                        <div
                                            class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                                            JS</div>
                                        Jane Smith
                                    </td>
                                    <td class="px-6 py-4">jane.smith@example.com</td>
                                    <td class="px-6 py-4"><span
                                            class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs">Silver</span>
                                    </td>
                                    <td class="px-6 py-4">Feb 15, 2024</td>
                                    <td class="px-6 py-4"><button class="text-blue-600 hover:underline">Edit</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Sidebar Overlay Mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
