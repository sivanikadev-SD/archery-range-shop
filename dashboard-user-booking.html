<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Lane | Archery Range</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7a1f1f', secondary: '#1f2933', accent: '#f59e0b',
                        bg: { light: '#f3f4f6', dark: '#0f172a' },
                        text: { light: '#111827', dark: '#e5e7eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-bg-light dark:bg-bg-dark text-text-light dark:text-text-dark transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed z-30 inset-y-0 start-0 w-64 bg-white dark:bg-gray-800 border-e border-gray-200 dark:border-gray-700 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 rtl:translate-x-full lg:rtl:translate-x-0">
            <div class="flex items-center justify-center h-16 border-b border-gray-200 dark:border-gray-700">
                <a href="index.html" class="flex items-center gap-2">
                    <i data-lucide="target" class="w-8 h-8 text-primary"></i>
                    <span class="font-bold text-xl">ArcheryPro</span>
                </a>
            </div>
            <nav class="p-4 space-y-1">
                <a href="dashboard-user.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="dashboard-user-booking.html"
                    class="flex items-center gap-3 px-4 py-3 bg-red-50 dark:bg-red-900/20 text-primary rounded-lg transition">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Book a Lane
                </a>
                <a href="dashboard-user-rentals.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i> Rentals
                </a>
                <a href="leagues.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition">
                    <i data-lucide="trophy" class="w-5 h-5"></i> My Leagues
                </a>
                <a href="dashboard-user-profile.html"
                    class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition">
                    <i data-lucide="user" class="w-5 h-5"></i> Profile
                </a>
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition mt-8 text-left">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ps-64">
            <!-- Top Header -->
            <header
                class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-16 flex items-center justify-between px-4 sm:px-6">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center gap-4 ms-auto">
                    <button id="theme-toggle"
                        class="theme-toggle-btn p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                        <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle"
                        class="dir-toggle-btn text-sm font-bold border px-2 py-1 rounded">LTR</button>
                    <div class="flex items-center gap-2">
                        <img src="https://ui-avatars.com/api/?name=John+Doe&background=7a1f1f&color=fff"
                            class="w-8 h-8 rounded-full" alt="User">
                        <span class="hidden sm:block font-medium text-sm">John Doe</span>
                    </div>
                </div>
            </header>

            <!-- Content Body -->
            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
                <h1 class="text-2xl font-bold mb-6">Book a Lane</h1>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Calendar Section -->
                    <div
                        class="lg:col-span-2 bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <h2 class="text-lg font-bold mb-4">Select Date & Time</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Date</label>
                                <input type="date"
                                    class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Duration</label>
                                <select
                                    class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition">
                                    <option>1 Hour</option>
                                    <option>2 Hours</option>
                                    <option>Half Day</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-8">
                            <h3 class="text-sm font-medium mb-3">Available Slots</h3>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">09:00
                                    AM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">10:00
                                    AM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-100 dark:bg-gray-700 text-gray-400 cursor-not-allowed">11:00
                                    AM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">12:00
                                    PM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">01:00
                                    PM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">02:00
                                    PM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">03:00
                                    PM</button>
                                <button
                                    class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-primary hover:text-white transition">04:00
                                    PM</button>
                            </div>
                        </div>
                    </div>

                    <!-- Summary Section -->
                    <div
                        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 h-fit">
                        <h2 class="text-lg font-bold mb-4">Booking Summary</h2>
                        <div class="space-y-4 mb-6">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Lane Type</span>
                                <span class="font-medium">Standard Indoor</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Date</span>
                                <span class="font-medium">Selected Date</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Time</span>
                                <span class="font-medium">Selected Time</span>
                            </div>
                            <div
                                class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-between font-bold">
                                <span>Total</span>
                                <span>$25.00</span>
                            </div>
                        </div>
                        <button
                            class="w-full bg-primary text-white py-3 rounded-lg hover:bg-red-800 transition font-medium">Confirm
                            Booking</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
