<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Archery Range & Pro Shop</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%237a1f1f%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><circle cx=%2212%22 cy=%2212%22 r=%226%22/><circle cx=%2212%22 cy=%2212%22 r=%222%22/></svg>">
    <!-- CSS & Tailwind -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7a1f1f', secondary: '#1f2933', accent: '#f59e0b',
                        bg: { light: '#ffffff', dark: '#0f172a' },
                        text: { light: '#111827', dark: '#e5e7eb' }
                    },
                    fontFamily: {
                        heading: ['Poppins', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 text-text-light dark:text-text-dark transition-colors duration-300 flex items-center justify-center min-h-screen relative overflow-x-hidden">

    <!-- Absolute Toggles -->
    <div class="absolute top-4 right-4 flex items-center gap-2">
        <button id="theme-toggle"
            class="theme-toggle-btn p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
            <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
        </button>
        <button id="dir-toggle"
            class="dir-toggle-btn p-2 text-sm font-medium border rounded hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800 transition">LTR</button>
    </div>

    <div class="w-full max-w-lg p-8 space-y-6 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700"
        data-aos="zoom-in" data-aos-duration="800">
        <div class="flex justify-center mb-4">
            <a href="index.html" class="flex-shrink-0 flex items-center gap-2">
                <i data-lucide="target" class="w-8 h-8 text-primary dark:text-red-500"></i>
                <span class="font-heading font-bold text-xl tracking-tight">ArcheryPro</span>
            </a>
        </div>
        <h2 class="text-3xl font-bold text-center font-heading">Welcome Back</h2>
        <p class="text-center text-gray-500 dark:text-gray-400">Sign in to access your dashboard</p>

        <form class="space-y-4" action="dashboard-user.html">
            <div>
                <label class="block text-sm font-medium mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input type="email" required
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="you@example.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" required
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="••••••••">
                </div>
                <div class="flex justify-end mt-1">
                    <a href="#" class="text-sm text-primary hover:underline">Forgot password?</a>
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white font-bold rounded-lg hover:bg-red-800 transition shadow-lg shadow-red-900/20">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4">
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
            <span class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-widest font-medium">Or continue
                with</span>
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
        </div>

        <!-- Social Login Buttons -->
        <div class="grid grid-cols-3 gap-3">
            <!-- Google -->
            <button type="button"
                class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 hover:bg-gray-50 dark:hover:bg-gray-800 transition shadow-sm group">
                <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 hidden sm:inline">Google</span>
            </button>

            <!-- Facebook -->
            <button type="button"
                class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 hover:bg-gray-50 dark:hover:bg-gray-800 transition shadow-sm group">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true">
                    <path
                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 hidden sm:inline">Facebook</span>
            </button>

            <!-- Apple -->
            <button type="button"
                class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 hover:bg-gray-50 dark:hover:bg-gray-800 transition shadow-sm group">
                <svg class="w-5 h-5 fill-current text-gray-900 dark:text-white" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.539 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.789 3.032 1.52-.065 2.09-.987 3.925-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.597 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                </svg>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 hidden sm:inline">Apple</span>
            </button>
        </div>

        <div class="text-center text-sm text-gray-500 dark:text-gray-400">
            Don't have an account? <a href="register.html" class="text-primary font-bold hover:underline">Register</a>
        </div>

        <div class="text-center mt-4">
            <a href="index.html"
                class="text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 flex items-center justify-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
