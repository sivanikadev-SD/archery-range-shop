<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Archery Range & Pro Shop</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%237a1f1f%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><circle cx=%2212%22 cy=%2212%22 r=%226%22/><circle cx=%2212%22 cy=%2212%22 r=%222%22/></svg>">
    <!-- CSS & Tailwind -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7a1f1f', secondary: '#1f2933', accent: '#f59e0b',
                        bg: { light: '#ffffff', dark: '#0f172a' },
                        text: { light: '#111827', dark: '#e5e7eb' }
                    },
                    fontFamily: {
                        heading: ['Poppins', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 text-text-light dark:text-text-dark transition-colors duration-300 flex items-center justify-center min-h-screen py-12 relative overflow-x-hidden">

    <!-- Absolute Toggles -->
    <div class="absolute top-4 right-4 flex items-center gap-2">
        <button id="theme-toggle"
            class="theme-toggle-btn p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
            <i data-lucide="sun" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
        </button>
        <button id="dir-toggle"
            class="dir-toggle-btn p-2 text-sm font-medium border rounded hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800 transition">LTR</button>
    </div>

    <div class="w-full max-w-md p-8 space-y-6 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700"
        data-aos="fade-up" data-aos-duration="800">
        <div class="flex justify-center mb-4">
            <a href="index.html" class="flex items-center gap-2">
                <i data-lucide="target" class="w-10 h-10 text-primary dark:text-red-500"></i>
                <span class="font-heading font-bold text-xl tracking-tight">ArcheryPro</span>
            </a>
        </div>
        <h2 class="text-3xl font-bold text-center font-heading">Create Account</h2>
        <p class="text-center text-gray-500 dark:text-gray-400">Join the ArcheryPro community</p>

        <form class="space-y-4" action="dashboard-user.html">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">First Name</label>
                    <input type="text" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="Sivanika">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Last Name</label>
                    <input type="text" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="Sam">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input type="email" required
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="you@example.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" required
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="Create password">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" required
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 dark:bg-gray-900 focus:ring-2 focus:ring-primary focus:outline-none transition"
                        placeholder="Confirm password">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="terms" required
                    class="rounded text-primary focus:ring-primary bg-gray-100 dark:bg-gray-900 border-gray-300 dark:border-gray-700">
                <label for="terms" class="text-sm text-gray-600 dark:text-gray-400">I agree to the <a href="#"
                        class="text-primary hover:underline">Terms & Conditions</a></label>
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white font-bold rounded-lg hover:bg-red-800 transition shadow-lg shadow-red-900/20">
                Create Account
            </button>
        </form>

        <div class="text-center text-sm text-gray-500 dark:text-gray-400">
            Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Login</a>
        </div>

        <div class="text-center mt-4">
            <a href="index.html"
                class="text-sm text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 flex items-center justify-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
